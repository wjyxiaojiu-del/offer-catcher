upstream offer_catcher_upstream {
    server 127.0.0.1:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name offer.xiaojiu.pw;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name offer.xiaojiu.pw;

    ssl_certificate /etc/letsencrypt/live/offer.xiaojiu.pw/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/offer.xiaojiu.pw/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # This application does not use Next.js Server Actions. Reject forged
    # action IDs at the edge so scanners cannot trigger noisy framework errors.
    if ($http_next_action != "") {
        return 400;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types application/json application/javascript text/css text/plain image/svg+xml;

    location /_next/static/ {
        proxy_pass http://offer_catcher_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
        proxy_pass http://offer_catcher_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }

    location / {
        proxy_pass http://offer_catcher_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }
}
